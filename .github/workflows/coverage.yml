name: Coverage

on:
  pull_request:
    branches:
      - develop
  push:
    branches:
      - develop

permissions:
  contents: write

jobs:
  coverage:
    name: Run Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-python3.13-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-python3.13-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install "genbadge[coverage]"

      - name: Run pytest with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=src/reactix \
            --cov-report=term-missing \
            --cov-report=xml:reports/coverage/coverage.xml

      - name: Add coverage to job summary
        run: |
          echo "## Coverage report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          coverage report --show-missing >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Generate coverage badge
        run: |
          genbadge coverage -i reports/coverage/coverage.xml -o badges/coverage-badge.svg

      - name: Commit updated badge
        if: github.event_name == 'push'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/coverage-badge.svg
          git diff --staged --quiet || git commit -m "Update coverage badge [skip ci]"
          git push