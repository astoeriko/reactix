name: Coverage

on:
  pull_request:
    branches:
      - develop
  workflow_dispatch:
  push:
    branches:
      - develop

jobs:
  coverage:
    name: Run Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-python3.13-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-python3.13-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=src/reactix \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml
      
      # If uploading the coverage report to Codecov:
      # uncomment the following lines and make sure you have a Codecov token set in your repository secrets.
      # More information: https://docs.codecov.com/docs/quick-start
      #
      # - name: Upload coverage reports to Codecov with GitHub Action
      #   uses: codecov/codecov-action@v5
      #   env:
      #     CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage XML as artifact
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: coverage.xml