project:
  type: website
  output-dir: _site

metadata-files:
  - api/_sidebar.yml

website:
  title: "Reactix"
  description: "Reactive transport modelling with JAX and PyMC"
  site-url: "https://astoeriko.github.io/reactix/"
  repo-url: "https://github.com/astoeriko/reactix"
  repo-actions: [edit, issue]
  page-navigation: true
  back-to-top-navigation: true

  navbar:
    logo: img/logo_without_text.svg
    left:
      - href: index.qmd
        text: Home
      - href: installation.qmd
        text: Installation
      - href: quickstart.qmd
        text: Quickstart
      - href: examples/index.qmd
        text: Examples
      - href: api/index.qmd
        text: API
      - href: developer-guide.qmd
        text: Development
    right:
      - icon: github
        href: https://github.com/astoeriko/reactix

  sidebar:
    - id: docs
      style: docked
      search: true
      contents:
        - section: Get started
          contents:
            - index.qmd
            - installation.qmd
            - quickstart.qmd

        - text: "---"
        - section: Examples
          contents:
            - examples/index.qmd
            - examples/transport-model.qmd
            - examples/pathogen-model.qmd
            - examples/transport_with_pymc.qmd
            - examples/mixed-reactor.qmd

        - text: "---"
        - href: api/index.qmd
          text: API reference

        - text: "---"
        - section: Development
          contents:
            - contributing.qmd
            - developer-guide.qmd

quartodoc:
  package: reactix
  parser: numpy
  dir: api
  style: pkgdown
  sidebar: api/_sidebar.yml
  css: api/_styles-quartodoc.css
  title: "API reference"
  sections:
    - title: Transport
      desc: Spatial discretization, advection/dispersion schemes, and boundary conditions.
      contents:
        - Cells
        - Advection
        - Dispersion
        - FixedConcentrationBoundary

    - title: Systems
      desc: Reactive transport and system containers, and solver helpers.
      contents:
        - TransportSystem
        - MixedSystem
        - make_solver
        - user_system_parameters

    - title: Species
      desc: Species declarations and species container utilities.
      contents:
        - declare_species

    - title: Reactions
      desc: Kinetic reaction interfaces and spatial parameter helpers.
      contents:
        - KineticReaction
        - reaction
        - SpatiallyConst
        - SpatiallyVarying

format:
  html:
    theme:
      light: cosmo
      dark: solar
    css:
      - api/_styles-quartodoc.css
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    code-tools: true
    number-sections: false
    smooth-scroll: true

execute:
  freeze: auto
  echo: true
  warning: false
  message: false