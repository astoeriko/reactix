="121.7168">Define species</text><path d="M312.8779,162.8281 L312.8779,201.6602 L292.8779,205.6602 L312.8779,209.6602 L312.8779,248.4922 A0,0 0 0 0 312.8779,248.4922 L448.9927,248.4922 A0,0 0 0 0 448.9927,248.4922 L448.9927,172.8281 L438.9927,162.8281 L312.8779,162.8281 A0,0 0 0 0 312.8779,162.8281" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M438.9927,162.8281 L438.9927,172.8281 L448.9927,172.8281 L438.9927,162.8281" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="67.5518" x="318.8779" y="179.895">Examples:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="75.1816" x="318.8779" y="195.0278">- @reaction</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="110.1001" x="318.8779" y="210.1606">- KineticReaction</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="115.1147" x="318.8779" y="225.2935">- FirstOrderDecay</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="114.8862" x="318.8779" y="240.4263">- SpatiallyVarying</text><rect fill="#FFFFFF" height="33.9688" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="162.4297" x="130.4482" y="188.6758"/><text fill="#222222" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="142.4297" x="140.4482" y="209.8145">Define reaction process</text><path d="M315.2568,258.4922 L315.2568,297.3242 L295.2568,301.3242 L315.2568,305.3242 L315.2568,344.1563 A0,0 0 0 0 315.2568,344.1563 L534.6846,344.1563 A0,0 0 0 0 534.6846,344.1563 L534.6846,268.4922 L524.6846,258.4922 L315.2568,258.4922 A0,0 0 0 0 315.2568,258.4922" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M524.6846,258.4922 L524.6846,268.4922 L534.6846,268.4922 L524.6846,258.4922" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="67.5518" x="321.2568" y="275.5591">Examples:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="39.895" x="321.2568" y="290.6919">- Cells</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="73.709" x="321.2568" y="305.8247">- Advection</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="77.3906" x="321.2568" y="320.9575">- Dispersion</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="198.4277" x="321.2568" y="336.0903">- FixedConcentrationBoundary</text><rect fill="#FFFFFF" height="33.9688" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="167.1875" x="128.0693" y="284.3398"/><text fill="#222222" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="147.1875" x="138.0693" y="305.4785">Define transport domain</text><path d="M286.0127,354.1563 L286.0127,423.2539 L266.0127,427.2539 L286.0127,431.2539 L286.0127,500.3516 A0,0 0 0 0 286.0127,500.3516 L529.6377,500.3516 A0,0 0 0 0 529.6377,500.3516 L529.6377,364.1563 L519.6377,354.1563 L286.0127,354.1563 A0,0 0 0 0 286.0127,354.1563" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M519.6377,354.1563 L519.6377,364.1563 L529.6377,364.1563 L519.6377,354.1563" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="222.625" x="292.0127" y="371.2231">Current design assumes a System</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="95.9131" x="292.0127" y="386.356">with transport.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="292.0127" y="401.4888">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="69.564" x="292.0127" y="416.6216">Issue #15:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="175.519" x="292.0127" y="431.7544">Create a separate class for</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="164.4551" x="292.0127" y="446.8872">models without transport</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="181.981" x="292.0127" y="462.02">(e.g. mixed/batch reactors),</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="177.5503" x="292.0127" y="477.1528">so users do not need to set</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="193.1719" x="292.0127" y="492.2856">transport parameters to zero.</text><rect fill="#FFFFFF" height="33.9688" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="108.6992" x="157.3135" y="410.2695"/><text fill="#222222" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="88.6992" x="167.3135" y="431.4082">Create System</text><rect fill="#FFFFFF" height="33.9688" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="209.1055" x="107.1104" y="520.3516"/><text fill="#222222" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="189.1055" x="117.1104" y="541.4902">Create solver with make_solver</text><path d="M316.127,608.3203 L316.127,654.7188 L296.127,658.7188 L316.127,662.7188 L316.127,709.1172 A0,0 0 0 0 316.127,709.1172 L522.7832,709.1172 A0,0 0 0 0 522.7832,709.1172 L522.7832,618.3203 L512.7832,608.3203 L316.127,608.3203 A0,0 0 0 0 316.127,608.3203" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M512.7832,608.3203 L512.7832,618.3203 L522.7832,618.3203 L512.7832,608.3203" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="172.8594" x="322.127" y="625.3872">Current rhs() handles both</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="157.0537" x="322.127" y="640.52">transport and reactions.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="322.127" y="655.6528">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="169.4761" x="322.127" y="670.7856">For the no-transport case,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="185.6563" x="322.127" y="685.9185">rhs() should have a different</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="63.4131" x="322.127" y="701.0513">structure.</text><rect fill="#FFFFFF" height="33.9688" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="168.9277" x="127.1992" y="641.7344"/><text fill="#222222" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="148.9277" x="137.1992" y="662.873">Solver calls System.rhs()</text><rect fill="#FFFFFF" height="33.9688" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="147.752" x="137.7871" y="729.1172"/><text fill="#222222" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="127.752" x="147.7871" y="750.2559">Unpack species state</text><rect fill="#555555" height="6" rx="2.5" ry="2.5" style="stroke:#555555;stroke-width:1;" width="393.3262" x="16" y="783.0859"/><rect fill="#FFFFFF" height="33.9688" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="172.7598" x="28" y="809.0859"/><text fill="#222222" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="152.7598" x="38" y="830.2246">Compute transport terms</text><rect fill="#FFFFFF" height="33.9688" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="166.5664" x="228.7598" y="809.0859"/><text fill="#222222" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="146.5664" x="238.7598" y="830.2246">Compute reaction terms</text><rect fill="#555555" height="6" rx="2.5" ry="2.5" style="stroke:#555555;stroke-width:1;" width="393.3262" x="16" y="863.0547"/><rect fill="#FFFFFF" height="33.9688" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="238.3262" x="92.5" y="889.0547"/><text fill="#222222" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="218.3262" x="102.5" y="910.1934">Combine transport + reaction terms</text><rect fill="#FFFFFF" height="33.9688" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="118.7656" x="152.2803" y="943.0234"/><text fill="#222222" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="98.7656" x="162.2803" y="964.1621">Return dstate/dt</text><polygon fill="#FFFFFF" points="211.6631,574.3203,223.6631,586.3203,211.6631,598.3203,199.6631,586.3203,211.6631,574.3203" style="stroke:#555555;stroke-width:0.5;stroke-linejoin:miter;stroke-miterlimit:10;"/><polygon fill="#FFFFFF" points="163.6912,996.9922,259.635,996.9922,271.635,1008.9922,259.635,1020.9922,163.6912,1020.9922,151.6912,1008.9922,163.6912,996.9922" style="stroke:#555555;stroke-width:0.5;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#222222" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="95.9438" x="163.6912" y="1012.8003">more time steps?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="19.0083" x="271.635" y="1006.3979">yes</text><rect fill="#FFFFFF" height="33.9688" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="164.9668" x="129.1797" y="1040.9922"/><text fill="#222222" font-fami